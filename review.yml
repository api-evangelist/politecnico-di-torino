  - date: '2026-06-03'
    rating: 3
    summary: >-
      Verified a real, official developer footprint without fabricating
      endpoints. The verified @polito GitHub org publishes an official OpenAPI
      3.0.3 spec (api-spec, TypeSpec-authored) that is the single source of
      truth for the PoliTO REST API backing the official students mobile app;
      the students-app .env.example points at the
      https://app.didattica.polito.it/mock/api host. The polito.it open-data
      portal publishes downloadable academic datasets but exposes no documented
      API. There is no self-service public developer program, sign-up, or
      published auth scheme; the production API is consumed by first-party apps.
      LinkedIn returns HTTP 999 (anti-bot) but the school page resolves in a
      browser.
    endpoints:
